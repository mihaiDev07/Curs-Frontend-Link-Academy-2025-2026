  <body>
    <h1>AP3</h1>
    <script>
      function getCheapProducts(params) {
        const result = [];
        params.forEach((element) => {
          if (element < 50) {
            result.push(element);
          }
        });
        return result;
      }

      console.log(getCheapProducts([95, 40, 120, 25, 60]));
    </script>
  </body>
