<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        //obiect ECMAScript 5
        let userObject = {
            name: 'Adrian',
            age: 40,
            //array
            favoriteFruits: ['mango', 'raspberry', 'blueberry'],
            //obiect
            car: {
                make: 'Dacia',
                model: 'Logan',
                isFunctional: true
            },
            //array de obiecte
            computer: [
                {
                    manufacturer: 'Apple',
                    type: 'laptop'
                },
                {
                    manufacturer: 'Dell',
                    type: 'laptop'
                }
            ],
            getData: function () { return "nume: " + this.name + ", varsta:" + this.age }
        };

        console.log(userObject.favoriteFruits[2]); // ?
        console.log(userObject.car.isFunctional); // ?
        console.log(userObject.computer[0].manufacturer); // ?
        console.log(userObject.computer[1].manufacturer); // ?
        console.log(userObject.getData()); // ?


        // ECMAScript 6

        class animal {
            constructor(size, kilograms, name) {
                this.size = size;
                this.kilograms = kilograms;
                this.name = name;
            }

            getPrice() {
                return this.kilograms * 2.25;
            }
        }

        class cat extends animal {
            constructor(size, kilograms, name, race) {
                super(name, kilograms, name);
                this.race = race;
            }
            weightMessage() {
                return "Aceasta pisica cantareste " + this.kilograms + " kg si costa " + super.getPrice() + " euro.";
            }
        }

        let c = new cat(10, 30, "Ariel", "Pisica persana");

        console.log(c.name);

        console.log(c.weightMessage());


        // Funcție care primește un șir și o funcție callback ca parametri:greetFunction
        function greetUsers(users, greetFunction) {
            for (let i = 0; i < users.length; i++) {
                greetFunction(users[i]);
            }
        }

        // Șir de nume
        let names = ["Ana", "Mihai", "Elena"];

        // Transmitem o funcție ANONIMĂ ca parametru
        greetUsers(names, function (name) {
            console.log("Hello " + name);
        });
        let user = {
            name: "Ana",
            regularFunc: function () {
                console.log("Regular function this:", this.name);
            },
            arrowFunc: () => {
                console.log("Arrow function this:", this.name);
            }
        };

        user.regularFunc(); // Regular function this: Ana
        user.arrowFunc();   // Arrow function this: undefined (sau gol, depinde de mediu)


        function add() {
            let counter = 0;
            function plus() { counter += 1; }
            plus();
            return counter;
        }
        function myCounter() {
            let counter = 0;
            return function () {
                counter++;
                return counter;
            };
        }
        let c1 = myCounter();
        console.log(c1()); // 1
        console.log(c1()); // 2
        console.log(c1()); // 3
        let a1 = add();
        console.log(a1); // 1
        let a2 = add();
        console.log(a2); // 1




    </script>
</head>

<body>
    <p>Exemplul de obiect in javascript</p>
</body>

</html>
